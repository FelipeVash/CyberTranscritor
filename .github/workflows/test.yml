name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev libportaudio2 libsndfile1 \
            libcairo2-dev libgirepository1.0-dev gobject-introspection \
            libglib2.0-dev libffi-dev python3-dev \
            libgirepository1.0-0 gir1.2-glib-2.0 libgirepository-2.0-0 \
            python3-gi python3-gi-cairo

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: pytest tests/ -v --log-file=test_output.log --cov=.

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test_output.log