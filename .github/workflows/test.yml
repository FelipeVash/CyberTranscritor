name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java (for LanguageTool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev libportaudio2 libsndfile1 \
            libcairo2-dev libgirepository1.0-dev gobject-introspection \
            libglib2.0-dev libffi-dev python3-dev \
            espeak-ng libespeak-ng-dev \
            ffmpeg libavcodec-extra \
            libdbus-1-dev libdbus-glib-1-dev \
            python3-gi python3-gi-cairo python3-dbus

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-base.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Set PYTHONPATH for system packages
        run: echo "PYTHONPATH=/usr/lib/python3/dist-packages:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run tests
        run: pytest tests/ -v --log-file=test_output.log --cov=.

      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test_output.log